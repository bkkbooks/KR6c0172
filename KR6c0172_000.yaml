front:
  text: 心經添足序如來出世本為眾生發明心地然心無跡難以形容不已於虗空中畫出一條鱉鼻蛇首尾宛然可觀而不可觸今不自量為蛇添足得無取嘯於人乎咦蓋欲令人知足識蛇如標月指讀是解者見蛇遺足得意忘蛇方為善用其智且不𠹛余如或不然未免毒氣所中切忌切忌時崇禎壬午秋日鼎湖山摻道人識心經添足科文釋此經文大科分二初釋題目二初正釋經題二釋譯人名二釋經文二初顯說般若四初因人顯法三初能修之人二所修之法三修證之位二正示法空二初明蘊空二顯空德二初總標二別釋四初釋蘊處界二釋十二因緣三釋四諦四釋智得三依法修證二初明菩薩得涅槃二明諸佛得菩提四結讚功能二密說般若四心經添足科文終
