body:
  text: 唐三藏法師玄奘奉詔譯明東鼎湖山沙門弘贊述釋此經文大科分二初釋題目二正釋經文初釋題目分二初正釋經題二釋譯人名初釋經題般若波羅蜜多心經經題八字有通別二義上七字是別別於諸經以諸經名號不同故經之一字是通通於諸經以如來所說同名經故就別題中復有二義上六字是所詮之法心之一字是所引之喻故此經以法喻為名或言單法為名以心字是結集人借義彰要非正喻也大乘為教相是深般若以空為宗是諸法空相涅槃為趣究竟涅槃實相為體色即是空觀照為用照見五蘊若通題釋以神鑒為體般若運到為用波羅蜜多若以因果釋般若為因無分別智波羅蜜多為果到彼岸般若之義有三謂實相觀照文字實相般若者謂法身真空之體元無名相今於無名相中建立假名而談實相故名實相以心源湛寂無相而相名為實相是所觀之真性即吾人虗靈不昧本覺真心非寂非照理性常住體離生滅染淨虗妄等法觀照般若者乃實相體所起之用即能觀之妙慧良由法性幽玄非此莫鑒諸佛以此而妙契法身菩薩以此而頓證真空即吾人無分別智非照而照照了一切諸法皆即真空無明即是實相故云色即是空文字般若者文字是諸佛詮理之教而文字性空性空之體即是般若故台教云文字是色是色即實相天王般若經云總持無文字文字顯總持是以能顯了實相觀照二種般若之德般若雖三原同一相所謂無相無相即是大覺圓常真空之體具此三名如世𠁼字若能一念正觀圓修照了諸法皆空是為圓證究竟涅槃梵語般若華言智慧智乃實相無分別之智慧是無分別智中之妙慧亦名淨慧亦名無相慧又慧即智故成實論云真慧名智此之智慧體性圓融照用自在能窮諸法實性之邊底是超情離見玄妙之絶稱非同世智之智聰慧之慧世之智慧從識心生分別塵境執取名言發妄知見為有漏根生死株不能破無明惑顯實相理恐人濫此故存梵音而不直翻華言究其實則無物可當其體無法可字其名乃強名為般若也梵語波羅蜜多此翻彼岸到若順此方之文則云到彼岸是究竟諸法實際無餘之義以生死為此岸煩惱妄念為苦海中流真空之際為彼岸般若如般筏故其行深般若者照蘊空無明滅見煩惱即實相生死即涅槃越二死海至三德岸名到彼岸其迷般若者種種分別妄執身心為有遂失慧光不了諸法實相名住此岸故華嚴云我觀一切衆生俱有如來智慧德相但以妄想執著而不證得以要言之但有纖情未盡便隔彼岸凡聖情忘即彼岸到無別以為到也心者譬如人心為四大百骸之要喻此經為六百卷般若所歸之宗要若達此經則六百般若朗焉有以此字為中心之心謂此經在六百卷之中心謬也或有以為真心之心然六百般若皆談真心非獨此經以般若即心也心有體用實相是體觀照是用以用歸體即名到彼岸故起信論云自心起信還信自心自心即體起信即用還信自心即是以用歸體華嚴別行鈔云智是理用理體成智還照於理智與理冥方曰真智真智即實相般若理即真空之理故經云無有如外智能證於如亦無智外如為智所入入是以用歸體況性相空宗各異寧容渾濫而六百般若皆一無相空宗是般若即真空體故涅槃云佛性者名第一義空第一義空名為智慧故說智慧足矣更不別說心性若說心性則成實法一涉實法便非空也或謂是薩婆若心原非經題以心外無般若般若外無心心無形相故說般若是為最玄最妙何用更言心乎經者梵語修多羅此翻為契經謂上契諸佛之理下契衆生之機今人尚略故單言經經即教也是佛所詮之教而訓常訓攝常以不變為義謂古今雖殊覺道不改群邪不能沮衆聖不能異攝謂貫攝玄微以開未悟同出苦津而登覺岸故有悟此經題則彼岸到矣別行鈔云若有解華嚴經題七字之義即一部之功已過半矣𠁼音伊二釋譯人名唐三藏法師玄契奉詔譯唐是國號三藏即經律論也法軌也師範也謂能為軌範以法訓人也玄奘是師法號本名褘俗姓陳乃漢太丘仲弓之後慧英處士之子母夢白衣人而誕年十一從兄長捷法師出家日授精理二十三便升講座詞理妙盡自惟此土經法未殫遂往西天學通三藏齎經律論梵夾歸唐奉詔譯為華言此心經前後共有六譯今所釋者正奘師所譯之本言譯者傳也謂傳彼西天之語而為東華之言也二正釋經文分二初顯說般若二密說般若初顯說般若分四初因人顯法二正示法空三依法修證四結讚功能初因人顯法分三初能修之人二所修之法三修證之位初能修之人觀自在菩薩此五字有通有別上三字是別名別諸菩薩故下二字是通號通諸菩薩故梵云婆盧枳底濕伐羅華言觀自在若云阿耶娑婆吉低輸華言觀世音梵本自有兩名亦經各旨所宗不同若從耳根悟入如楞嚴經菩薩從聞思修入三摩地大悲經菩薩聞呪即超八地斯皆從耳根悟無生忍名觀世音從體起用故云觀其音聲即得解脫六根互用故現千手眼照護群生今經從眼根證入故云照見五蘊皆空度一切苦厄名觀自在然此有能所自行化他之義觀字若作平聲即屬能觀世音屬所觀即所化機故法華經云一心稱名觀世音即時觀其音聲皆得解脫此即能所化他也楞嚴云由我觀聽十方圓明故觀音名遍十方界此兼眼耳二根故云觀聽並屬自行大悲經兼觀音自在二號即屬自他若準溫陵釋觀音者觀世言音圓應圓悟之號此亦兼自行化他然自行邊觀字應作去聲謂此菩薩用般若觀慧照見五蘊身心空寂度諸苦厄即生死解脫得大安樂故云自在交光云觀字隨俗雖作平聲理實去聲良以納聲為聞達理為觀特取達理故於音聲不言聞而言觀也復須知因中名自行果上是化他然菩薩以利生為要必兼化他方應菩薩之號菩薩者梵音具云菩提薩埵菩提此翻覺薩埵翻為有情就中亦有自行化他二義自行邊則菩薩已具覺悟之智尚有餘習之情未盡習情若盡則名為佛若化他邊謂菩薩以悲愍心開覺一切有情令見大道二義合名故稱菩薩有情即衆生別稱二所修之法行深般若波羅蜜多時行是修行即所入觀行也深是甚深即真空般若非心所知非識能識般若約教有二一深二淺淺者名人空般若是二乘所證深者即法空般若是菩薩所入今此真空實相非二乘偏空小智所踐故云深也時者證入真空體在一剎那時也乃菩薩以無分別智照了五蘊身心廓然寂滅性相皆空即最後一剎那頃證入真空體之時而稱體起用度一切苦厄亦在一剎那時大般若經云皆以無性而為自性用一剎那相應妙慧證得無上正等菩提是也若據不空所譯本即非因地時乃菩薩入慧光定時說今按本譯以因地釋令行人有所措心也如心地觀經云一剎那心般若相應悟三世法無餘是知以因地為正言體用皆在一剎那時者由五蘊本空苦厄斯無故體用同時也言無分別智者亦名根本智若最初一念聞聲見色得聲色自性時是現量當前即無分別智照不屬生滅有無此智才發分別之心頓泯當體即是真空若見真空名見佛性若剎那流入意地起第二念分別事理即是生滅心生滅妄想相續念念不住隨他聲色流轉即智而成識若不起分別境自如如即識而成智矣剎那者時之極速也一念中有九十剎那又云一彈指頃六十五剎那三修證之位照見五蘊皆空度一切苦厄照見是能入之觀五蘊是所觀之境正以妙慧照見五蘊自性當體皆是真空故異二乘滅色求空若證真空時能所俱忘矣照字在果即觀自在之觀字在因即吾人率爾心時不起分別之現量故此照之一字是修般若最初下手工夫之要術即無分別智照而了了者見非眼根及眼識所見乃現量當前於一切法得法自性不見纖塵可得所謂不見色不見受想行識非曰不見見即無見由五蘊本空即是實相實相無相故不可見不可見而見洞徹法界非唯不見世間諸法於出世間一切禪定智慧解脫三昧無上正覺菩提涅槃等法悉空故皆不見都無所見名為照見是見諸法實相也瞥有少見即墮妄想無明窟宅矣五蘊者色受想行識也蘊以積聚為義謂諸衆生由此五法積聚成身復由此身積聚無量塵勞煩惱而受無量生死輪回之苦又名五陰亦由積聚妄想煩惱而陰覆本明真性也色以質礙為義謂此身假合地水火風四大因緣而成幻質洎外山河大地器界凡有形者皆名為色受以領納為義謂眼耳鼻舌身意之六識納彼色聲香味觸法之六塵想以審思取像為義即意識緣想六塵之境行以造作為義即意識思惟塵境造作善惡行業識以了別為義名為心王受想行是心所故此五蘊總名身心二法此之身心如幻如化從因緣生原無實性故佛為瓶沙王說喻色如聚沫因風吹水成聚體相無實受如水泡水因物擊成泡起滅無常衆生所受苦樂之事亦爾想如陽𦦨遠望曠野日光發焰如水渴者思飲衆生因念成想終為虗妄行如芭蕉蕉體危脆中無有實衆生造作諸行亦爾識如幻事幻術幻作人馬本無實體衆生識心分別諸法隨境生滅如幻無實菩薩以般若智觀此五蘊色從四大假合而有受想行識由妄想境界而生四大妄想本無自性當體即空故曰皆空非謂絶然滅無為空亦非有法能令彼空以彼本自空故衆生不了水月空華故執五蘊幻有之色而迷自性之真空真空幻有體無有二但隨凡聖所見不同若以妄心分別則見五蘊而遺真空若以般若觀則真空現而五蘊亡是故真空一顯幻有都滅即五蘊斯空而苦厄斯度是為到彼岸矣言度者脫也超越也一切苦厄者世出世間諸苦也此上序述觀自在菩薩修證之旨乃一經之綱領使人效而修之若有上機之人覩此便悟無生如其上上根者聞觀自在名即頓證真空何假後語如或未然須詳下文上言證者乃證悟之證非同二乘取證果位之證故經云無智亦無得下皆同也鎮國云生死之本莫過人法二執迷身心總相故計人我為實有迷五蘊自相故計法我為實有智眼照知五蘊和合假名為人一一諦觀但見五蘊求人我相終不可得先觀色蘊是觀身了知堅是地潤是水暖是火動是風觀餘四蘊則是觀心了知領納為受取相為想造作為行了別為識依此身心諦觀分明但見五蘊求人我相終不可得名為人空若觀一一蘊皆從緣生都無自性求蘊相不可得則五蘊皆空名為法空是以照五蘊而二空理現矣言世間苦者所謂八苦生老病死冤憎會愛別離求不得五陰盛也出世間苦者變易生死也謂聲聞緣覺菩薩雖離世間分段生死而有方便等土變易生死如初位為因後位為果又後位為因後後位為果以其因移果易故名變易言分段者謂三界內衆生隨其作業所感果報身之形段則有長短命之分限則有延促是名分段生死以照見蘊中我人空故滅煩惱障即度分段苦以照見五蘊自性空故滅所知障即度變易苦苦厄雖衆而二死收盡今見真空則度厄已盡矣二正示法空分二初明蘊空二顯空德初明蘊空舍利子色不異空空不異色色即是空空即是色受想行識亦復如是此正釋明五蘊真空顯非離色明空及斷滅空以即色之空為真空即空之色為幻色而色是一切法相之首故舉初攝後以色義既彰則萬法昭然色即四大幻有之色空即般若真空之理衆生因迷真空而成幻有之色幻有緣生元無自性本是真空如波外無水由衆生以妄想風擊彼真源遂迷源逐浪沉溺苦津如來教以般若觀慧照了幻有無異真空如悟波不異水故云色不異空如志公曰有相身中無相身無明路上無生路是也空不異色者真空為萬法之體故本具一切諸法如水出生波濤影沫及隨器方圓等相而衆生因執幻相故迷真空如愚夫觀波迷水如來教修般若觀慧達真空體無異幻相如悟水不異波故云空不異色色即是空空即是色者正發明不異之旨以不異故即是之也又恐人因法成執猶存色空二見如世謂玉石相似仍存二物故言不異今欲泯此二見使人妙契色空不二全體即是如波即水如水即波動靜似分體無二致由迷真空故令識幻即真權立二名元無二物故永嘉云無明實性即佛性幻化空身即法身是知幻境本真不由修習今因迷重故須般若智照不假智照不知本真不知本真致見各異凡夫執有身心故見生滅受於生死外道著空撥無罪福故墮輪回二乘妄見五蘊實有其相不了緣生心起厭離故墮聲聞雖了五蘊諸法緣生不達無性故墮緣覺若了五蘊諸法無性緣生緣生無性無性故空空即真空是名為佛法身真空之體原非斷滅故須於幻有中求幻外無真故曰真空真外無幻故曰幻色此真空幻色不異相即是一經之極旨般若之真宗舊依教釋佛為執有之徒破色立空故云色不異空為執空之徒破空立色故云空不異色為諸菩薩顯中道觀示實相理俱立俱破故云色即是空空即是色今經幻色當體即是真空全非破空有之旨故非舊釋色蘊既爾四蘊皆然故云受想行識亦復如是若具說者應云受不異空空不異受受即是空空即是受餘三蘊例之可知是名五蘊皆空今如來令觀此現前五蘊身心為所觀境不假別求他法為境是為最切最要若能觀一蘊空則蘊蘊皆空故圓覺經云幻身滅故幻心亦滅幻心滅故幻塵亦滅幻塵滅故幻滅亦滅幻滅滅故非幻不滅但彼經以破幻顯真此經即幻是真旨雖不同色心無異既知此心真妄同源空有不二即此現前一念妄想起處便是真空獨露呈前當下以智觀察見妄無體便是真空即凡心而見佛心詎可棄茲幻妄而別想真如如棄波求水烏可得哉此之空有不二真妄同源非智莫達故呼舍利子而告之舍利是梵語子是華言乃如來第一智慧弟子本南天竺大論師提舍婆羅門所生母名舍利從母受稱故名舍利子此譯云身子以母好形身故又譯云鶖子以其母眼明淨如鶖鳥之目或言其母才辨喻如鶖鳥鶖即春鶯又云百舌鳥是按此經六譯而施護所譯本謂觀自在菩薩在靈鷲山為舍利子說既爾菩薩下當有言字今據經文勢及大部般若中應是佛說以文非全部故無緣起及流通二分然智者但取其義勿泥其跡若佛說若菩薩說皆可離色明空者謂空在色外如墻處不空墻外是空斷滅空者謂滅色明空如穿井除土出空以先有後無是為斷滅此二非真實心無知無用不能現於萬法然外道二乘皆有斷滅外道斷滅歸於太虗二乘斷滅歸於涅槃有以此經如餘經三分分釋從觀自在至度一切苦厄為緣起序分舍利子至三菩提為正宗分故知以下皆為流通分如此亦強為穿鑿然此既云心經即大部般若之心故無序分等慈恩云録大經妙最別出此經三分二序故皆遺闕餘譯雖自有緣起之文而不合衆譯但得其旨不可於此妄生是非二顯空德分二初總標二別釋初總標舍利子是諸法空相不生不滅不垢不淨不增不減是諸法者即五蘊等法也空相者即諸法之真空實相也蓋前示五蘊幻有即是真空而未說其相故今示云是諸法空相既云諸法空相則不可離諸法而別言空相此直指諸法當體即是真空之相譬如水月鏡像體離生滅垢淨增減故不可作之令生壞之使滅染之令垢治之使淨加之令增損之使減何以故以彼影像無實當體即空亦如虗空不可以生滅垢淨增減名之真空之相亦爾故不可得而名之乃強名曰實相實相之相非五眼能窺心智所測唯證者能知蓋生滅約指蘊處界垢淨約指四諦因緣增減約指智得以蘊等是迷真逐妄故見生滅十二因緣有流轉還滅二門其流轉門是苦集二諦乃世間因果故垢其還滅門是道滅二諦乃出世因果故淨菩薩修行道有所增而惑有所減故云增減今言不生滅垢淨增減是發明諸法真空相中本無凡聖修證因果等法直顯般若一真空體使人諸見脫落一絲不掛獨露真常即如如佛還源觀中云隨流加染而不垢返流除染而不淨在聖體而不增處凡流而不減略疏云色從緣起真空不生色從緣謝真空不滅又隨流不染出障非淨又障盡非減德滿不增此生滅垢淨增減是有為法相翻此以顯真空之相故云空相二別釋分四初釋蘊處界二釋十二因緣三釋四諦四釋智得初釋蘊處界是故空中無色無受想行識無眼耳鼻舌身意無色聲香味觸法無眼界乃至無意識界是故者承上起下之詞以發明諸法空相不生滅等之故故無色受等也空中者即空相之中以真空實相本離一切凡聖等法故無蘊處界因緣修證之相至於般若空中空性尚不可得況有蘊處界等法故云無也蓋無非同龜毛兔角之無乃即一切相離一切相為無以妄情一息凡聖見銷真空獨露故無蘊處界等可得無色至行識是無五蘊也無眼耳至觸法是無十二處也無眼界至無意識界是無十八界也此合六根六塵為十二處根以能生識為義塵以染污情識為義合六根六塵六識為十八界在內為六根在外為六塵根塵相對識生其中所謂眼識耳識鼻識舌識身識意識界以界別為義謂此十八法各有別體義無渾濫如眼以色為界耳以聲為界乃至意以法為界眼不能越色有見耳不能越聲有聞乃至意不能越法有知色以眼為界以色必眼所見非聲香等能對眼故乃至意以法為界以法必意所知非聲香等能對意故眼識界是眼家之識必依眼根始發非依餘根能發而眼亦不能發聲香等識故此為別餘可例知乃至者是舉其始末而包括其中也此蘊處界名為三科法門法門雖三總色心二法開合不同佛為迷心不迷色人說五蘊法合色為一分開心為四分受想行識皆心分故為迷色不迷心人說十二處法開色為十分半謂內五根外六塵法塵半分故合心為一分半謂意根一分法塵半分為心色俱迷人說十八界開色為十分半準上應知開心為七分半謂眼耳鼻舌身意之六識加意根一分法塵半分如來逗衆生機說此三科法門各隨根性任修一法即能悟入今此般若真空門中都無是事是故言無正顯真空實相體非質礙領納審思造作了別積聚之相故無色受想行識也真空實相體非根塵能入所入之相故無十二處也真空實相體非根塵識別之相故無十八界也二釋十二因緣無無明亦無無明盡乃至無老死亦無老死盡此名十二因緣亦名緣起亦名緣生所謂無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死言無明者昏暗義也謂過去世煩惱之惑覆蓋真性無妙覺之明妄認四大為自身相六塵緣影為自心相故名無明大般若經云如無所有如是而有若於如是無所有法不能了達說名無明何等法無所有謂蘊處界乃至十八不共法一切智道相智一切相智彼由無明及愛勢力分別執著斷常二邊由此不知不見諸法無所有性行者造作也謂過去身口造作善不善業故名行識者心王也真妄和合名之為識由過去惑業相牽致令此神識投托母胎名色者名即心色即身也從托母胎至第五箇七日生諸根形四肢差別是為名色六入者六根也從名色後至第七箇七日六根開張有入六塵之用故名六入亦名六處觸者觸對也從出胎已來至三四歲時六根雖觸對六塵然未能了知生苦樂想故名為觸受者領納也從五六歲至十二三歲時因外六塵觸對六根即能領納前境好惡等事然猶未能起淫貪等心故名為受愛者貪愛也從十四五歲至十八九歲貪於姓欲諸境及勝妙等事然猶未能廣遍追求故名為愛取者求取也從二十歲後貪欲轉盛於五塵境廣遍馳求故名為取有者後有也因馳求諸境起善惡業積集牽引當生三界有漏之果故名為有生者受生也今現世所作善惡之業後世還於六道四生中受生故名為生老死者衰壞也謂來世受生已後五蘊之身衰已還壞是名老死此十二法展轉感果故名因互相由藉名為緣三世相續循還無有間斷如輪回轉故曰輪回始由過去世無明行為因招感現在識名色六入觸受五者為果由現在果起愛取有三者為現在因由現在因而感未來世生老死之果此是生相即凡夫法名流轉門若緣覺人悟此諸法緣生而無明滅則行滅乃至老死滅此是滅相即緣覺法名還滅門若以般若觀慧照了無明體性皆空無生滅相故云無無明亦無無明盡乃至無老死亦無老死盡言無無明是舉流轉初相空亦無無明盡是舉還滅初相空乃至無老死是舉流轉末相空亦無老死盡是舉還滅末相空盡即滅也此蓋舉其始末空而該其中以顯般若真空體非流轉還滅之相故無十二因緣也三釋四諦無苦集滅道苦即生死苦果集是惑業苦因此是世間因果滅即涅槃樂果道是道品樂因此是出世間因果智度論云世間及身是苦果貪愛瞋癡等諸煩惱是苦因煩惱滅是苦滅滅煩惱方法是名為道如來說此四聖諦法蓋為凡夫二乘不知三界五蘊諸法如幻如化本自無生性相寂滅生死涅槃猶如昨夢而於無生法中妄見生滅橫受輪回譬如陽𦦨無水處妄作水想徒自疲勞是故如來令彼知苦斷集慕滅修道暫息苦本聲聞不了耽寂滅樂以為實證大乘菩薩修般若觀見真空理無生滅修證之法生滅修證自性空故故云無苦集滅道諦者審實也凡夫雖有苦集而不審實不得稱諦無倒聖智審知境故故名聖諦道品者即三十七品菩提分法詳餘經論四釋智得無智亦無得智即能觀之智得即所證之理意明不但無蘊處界諦緣諸法即三乘人能證所證及修般若菩薩空諸法之智與空智之所得理亦無蓋法性如空以眼病故於空見華而取證故大般若經云欲知說如來不能證諸佛法祕密義趣當學如是甚深般若波羅蜜多何以故所證佛法及能證者不可得故又云於一切法勝義諦中能證所證證處證時及由此證若合若離皆不可得不可見故菩薩於諸法空不應作證謂觀法空時先作是念我應觀法諸相皆空不應作證我為學故觀諸法空不為證故觀諸法空乃至我於無上正等菩提今時應學不應作證故智度論云菩提深入空故知空亦空涅槃亦空故無所證以證不證法不可得故始從五蘊終至四諦乃三乘人修道所觀之境今修般若如大火聚無論淨穢觸處皆燒是故真空理顯凡情蕩盡真如聖境一切智智悉不可得故世之蘊處界出世之四諦因緣以至能證所證莫不皆空是則人法兩忘境智雙泯如病去藥除故云無智亦無得三依法修證分二初明菩薩得涅槃二明諸佛得菩提初明菩薩得涅槃以無所得故菩提薩埵依般若波羅蜜多故心無罣礙無罣礙故無有恐怖遠離顛倒夢想究竟涅槃以無所得故者承上諸無字而言謂由前諸法無所得之故菩薩因依之而修得究竟涅槃故此無字乃統一經之旨蓋由法性如如體本寂滅若以有所得心即迷本真失於般若觀慧何由遠離顛倒得於究竟涅槃涅槃經云無所得者則名為慧菩薩得是慧故名無所得又無所得者名大涅槃菩薩安住大涅槃中不見一切諸法性相故名無所得又無所得者名為大乘菩薩不住諸法故名大乘清涼云無所得即般若相由得般若無得智慧故方得也大品云以無所得而為方便智度論云有二種空一無方便空故墮二乘地二有方便空則無所墮直至無上菩提復有二種空一但行空墮二乘地二行不可得空空亦不可得則無處可墮故諸菩薩以般若方便觀慧照諸法空故於蘊處界因緣諦相及能證所證皆無所得以此無所得心故而依般若修行則業纍解脫由依此修行故則惑不礙心境不礙智故心無罣礙由無罣礙則業纍解脫以業脫故則外無三界果報之恐怖由無果報則內永離煩惱之顛倒夢想以離煩惱則真常獨露是為究竟涅槃斯顯般若真空體非生滅違因失果故諸菩薩於一切法無所得是得究竟涅槃然一大部般若皆以無所得而為宗致設有一法過涅槃上者亦如夢如幻悉不可得故大般若經云雖達一切法自性皆空而諸菩薩因此般若波羅蜜多證得無上正等菩提轉妙法輪度無量衆雖證菩提而無所證證不證法皆不可得故以不可得即無能證所證諸忘知見由無妄見故無顛倒之煩惱若有所證即是顛倒夢想豈得涅槃菩提金剛般若不壞假名論云若論菩薩證真實時乃至法身亦無得故菩提薩埵者是能依之人般若波羅蜜多者是所依之法心無罣礙顛倒夢想是能空之障究竟涅槃是所證之果究竟涅槃者五住究盡二死永亡名為究竟亦名無餘以究盡涅槃之際故復名無住處涅槃非同二乘但離見思惑名為解脫權得化城之涅槃誠非究竟梵稱涅槃華言圓寂圓謂德無不備寂謂障無不盡亦翻大滅度大即實相滅即蘊空度即越苦又大即法身滅即解脫度即般若菩薩修般若觀諸法空實相理顯了生死幻身即本法身煩惱即般若結業即解脫此則三障頓空三德斯圓是謂究竟涅槃三障者即業障報障煩惱障也業能縛衆生在生死獄不得解脫故名罣礙三界果報猶如火宅是可畏相故名恐怖無明體性是顛倒法猶如夢想故名顛倒夢想由離煩惱則不起惑結業由離結業則無果報矣五住者即五住地惑此惑能令衆生住著生死故也一一切見住即三界見惑也二欲愛住即欲界思惑也三色愛住即色界思惑也四有愛住即無色界思惑也五無明住即根本無明惑也二乘未了此惑故沉滯於空即住方便土大乘菩薩方便斷除猶餘惑未盡故住實報土今修般若餘惑頓破故名究竟二明諸佛得菩提三世諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提三世者過去未來現在也阿耨多羅三藐三菩提者華言無上正等正覺即諸佛所證之道意明非獨菩薩以無所得心依般若而得涅槃三世諸佛亦以無所得心依般若而得無上菩提菩提涅槃原無二路皆依般若而得捨此般若而無有得之者故大般若經云一切如來應正等覺乘如是乘行如是道來至無上正等菩提此乘此道當知即是甚深般若波羅蜜多摩訶般若經云諸法自相空即是阿耨多羅三藐三菩提又云菩薩行般若作佛已變名為阿耨多羅三藐三菩提菩提是智德涅槃是斷德菩提涅槃其名雖二而皆是極聖所證二轉依果以惑非智而不斷智非斷而不圓故大般若經云菩薩於菩提道及一切波羅蜜多已圓滿故由一剎那相應妙慧證得如來一切相智爾時一切煩惱習氣相續永不生故名無餘斷則名如來應正等覺是知如是二果皆依般若波羅蜜多而得成就也佛者梵音具云佛陀華言覺乃窮理盡性之稱所謂悟性真常了惑虗妄運無緣慈度有情界行滿果圓故謂之大覺也大般若經云於一切法自然開覺故名佛陀如實開覺一切有情令離顛倒惡業衆苦故名佛陀以何義故名為菩提證法空義及證真如義是菩提義諸佛所有真淨妙覺故名菩提諸佛由此現覺諸法一切種相故名菩提如來者謂乘先佛道來成正覺故名如來又然諸法相有佛無佛法界法爾佛於此相如實現覺故名如來又如來依般若波羅蜜多如實覺一切法真如不虗妄不變異由此覺真如相故說名如來應正等覺言智德者謂以平等智慧照了諸法圓融通達無礙隨衆生機為其演說而無差謬也斷德者謂斷除一切煩惱惑業淨盡無餘隨所化住處惡不能染縱任自在而無纍縛也二轉依果者以悟煩惱即菩提故轉煩惱而依菩提乃諸佛所證之道以生死即涅槃故轉生死而依涅槃是諸佛所證之果也四結讚功能故知般若波羅蜜多是大神呪是大明呪是無上呪是無等等呪能除一切苦真實不虗故知者承上菩薩諸佛皆依此深般若而證得涅槃菩提由是故知般若功用不可思議非名言數量能宣乃以四種呪而讚喻之神以不測為義明能破暗謂此般若神功妙用非心量所知能滅無明癡暗而顯真空智理證得菩提涅槃更無有法出於其上故云無上是諸佛祕密之心印故亦無有法與之比倫故云無等等又此般若名無比法復無有無比法與之比故名無等等五住結盡二死俱亡四生果謝萬纍都損故云能除一切苦如是般若妙用難思了妄即真即凡成聖決定息苦無疑特令衆生信受奉行故云真實不虗大般若經云學此般若波羅蜜多大呪王時於我及法雖無所得而能證得無上正等菩提智論云何故名般若為大明呪謂諸外道俱有種種呪術利益人民能隨意所欲使諸鬼神大得名聲人民歸伏般若波羅蜜於諸呪術中是大呪術常與衆生道德樂故諸餘呪術能起貪瞋煩惱自在作惡墮三惡道是般若波羅蜜呪能滅禪定佛道涅槃諸著何況貪瞋粗病是故名為大明呪無上呪無等等呪又是呪能令人離老病死能立衆生於大乘能令行者於一切衆生中最大是故言大呪能如是利益故名無上古有仙人所作能知他人心呪名抑叉尼能飛行變化呪名揵陀梨能住壽過千歲萬歲呪於諸呪中無與等於此無等呪術中般若波羅蜜過出無量故名無等等又諸佛法名等般若波羅蜜得佛因緣故言無等等又諸佛於一切衆生中名無等是般若呪術佛所作故名無等等呪二密說般若故說般若波羅蜜多呪即說呪曰揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆訶此密說般若是不思議境體即真空無異顯說但以顯說恐人依文解義依說起見復執真空實有其體遂成實法還同生滅不知真空亦空而反生執著復墮無明故大般若經云一切法自性空空性不應執著空性空中空性尚不可得況有空性能執著空所以不了真空本如便以智求智智則成解解即失真起於照心照則立境隨照失體返成影事是以大智居於目前翻為名相之境故永嘉云不離當處常湛然覓則知君不可見今此密說般若正使人情忘智泯不假尋求真空現前倐然默證踰於符契故謂之曰呪即如來難思祕密真實之語呪願衆生如佛無異是故持誦者當空其心而一其念念念無間如蜾裸之呪螟蛉自然冥妄契真即凡成聖或云顯說令解生慧滅煩惱障密說令誦生福滅罪業障或有強釋以揭諦翻為度波羅為彼岸僧為衆謂自度度他與衆同到菩提彼岸如是翻釋有乖至理全非聖意既云密說人寧解之尚非小聖因位菩薩能測況容凡愚可以義釋名言雙絶理事兩忘爍迦羅眼窺摸不著一落心思便成知見渣滓知見立知即無明本無明斯立萬劫汩沉一切苦厄何由度哉心思若絶知見是泯無明斯破而彼岸斯到矣薩婆訶即娑婆訶翻速疾成就又云是圓寂義其義衆多詳如餘處
